services:
  - type: web
    name: vaultify-smartdocs
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: RESET_CODE_EXPIRY_MINUTES
        value: 15
      - key: MAX_FILE_SIZE_MB
        value: 10
